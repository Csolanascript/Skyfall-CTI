# ============================================================================
#  SKYFALL-CTI  —  Plataforma CTI Proactiva y Multidimensional
#  Docker Compose · Entorno de desarrollo
# ============================================================================

networks:
  skyfall_public:
    driver: bridge
  skyfall_backbone:
    internal: true                    # Aísla las bases de datos del exterior

services:

  # ═══════════════════════════════════════════════════════════════════════════
  #  1. INFRAESTRUCTURA DE MENSAJERÍA (KAFKA)
  # ═══════════════════════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:8.0.0
    container_name: skyfall-kafka
    ports:
      - "9092:9092"
    environment:
      # --- Configuración de Nodo KRaft ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      
      # --- Listeners ---
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      
      # --- Optimización para Desarrollo ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - skyfall_backbone
      - skyfall_public

  # ═══════════════════════════════════════════════════════════════════════════
  #  2. PERSISTENCIA HÍBRIDA
  # ═══════════════════════════════════════════════════════════════════════════

  # --- Elasticsearch: búsqueda semántica, logs, OSINT crudo ----
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.1
    container_name: deployment-elasticsearch-1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - skyfall_backbone

  # --- Neo4j: Knowledge Graph STIX 2.1 ---
  neo4j:
    image: neo4j:enterprise
    container_name: deployment-neo4j-1
    ports:
      - "7474:7474"                   # HTTP Browser
      - "7687:7687"                   # Bolt / Bloomcomo
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: ${NEO4J_ACCEPT_LICENSE_AGREEMENT}
      NEO4J_PLUGINS: ${NEO4J_PLUGINS}
      NEO4J_server_bolt_advertised__address: ${NEO4J_server_bolt_advertised__address}
      NEO4J_server_bolt_listen__address: ${NEO4J_server_bolt_listen__address}
      NEO4J_server_ssl_policy_bolt_enabled: ${NEO4J_server_ssl_policy_bolt_enabled}
      NEO4J_server_config_strict__validation_enabled: ${NEO4J_server_config_strict__validation_enabled}
    volumes:
      - neo4j_data:/data
    networks:
      - skyfall_backbone
      - skyfall_public

  # ═══════════════════════════════════════════════════════════════════════════
  #  3. ORQUESTACIÓN NO-CODE  —  n8n
  # ═══════════════════════════════════════════════════════════════════════════

  # Instancia n8n → Pipeline OSINT / Social:
  #   F4: Consolidación newsletters + detección campañas (LLM)
  #   F5: Enriquecimiento campañas/IoCs → STIX 2.1 (newsletters)
  #   F6: Síntesis inteligencia Grok/xAI sobre X
  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5679:5678"
    environment:
      GENERIC_TIMEZONE: Europe/Madrid
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-}
      N8N_DEFAULT_USER_EMAIL: ${N8N_DEFAULT_USER_EMAIL}
      N8N_DEFAULT_USER_PASSWORD: ${N8N_DEFAULT_USER_PASSWORD}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      N8N_KAFKA_BROKER: kafka:29092
      INTELOWL_URL: http://intelowl:8001
      INTELOWL_API_KEY: ${INTELOWL_API_KEY}
      GROK_API_KEY: ${GROK_API_KEY}
      GROK_API_URL: https://api.x.ai/v1
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - kafka
    networks:
      - skyfall_public
      - skyfall_backbone

  # ═══════════════════════════════════════════════════════════════════════════
  #  4. PRODUCTORES PROGRAMÁTICOS (PYTHON)
  # ═══════════════════════════════════════════════════════════════════════════

  # Crawler Telegram (Telethon MTProto) → HTTP POST a n8n-osint webhook
  telegram-crawler:
    build: ../services/telegram-crawler
    environment:
      PYTHONUNBUFFERED: "1"
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/telegram
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_SESSION_NAME: skyfall_bot
    volumes:
      - telegram_sessions:/app/sessions
    depends_on:
      - n8n
    networks:
      - skyfall_backbone
      - skyfall_public

  # MITRE ATT&CK Ingestor: descarga Enterprise/Mobile/ICS ATT&CK desde GitHub,
  # valida con stix2.MemoryStore y produce ~18 400 objetos STIX 2.1 en Kafka.
  # Se ejecuta una sola vez al arrancar (restart: "no").
  mitre-ingestor:
    build: ../services/mitre-ingestor
    environment:
      PYTHONUNBUFFERED: "1"
      RUN_MITRE_INGESTOR: ${RUN_MITRE_INGESTOR}
      MITRE_DOMAINS: "enterprise-attack,mobile-attack,ics-attack"
    volumes:
      - mitre_staging:/data                
      - stix_dropzone:/app/dropzone
    depends_on:
      - kafka
      - neo4j
    networks:
      - skyfall_backbone
      - skyfall_public
    restart: "no"

  # Dumps Crawler: scraping de IP/hashes desde GitHub → Kafka topic: stix.dumps
  # Pipeline completo en Python: descarga, parseo, enriquecimiento (Intel-Owl)
  # y transformación a STIX 2.1 sin pasar por n8n
  dumps-crawler:
    build: ../services/dumps-crawler
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKER: kafka:29092
      KAFKA_TOPIC: stix.dumps
      INTELOWL_URL: http://intelowl:8001
      INTELOWL_API_KEY: ${INTELOWL_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SCRAPE_INTERVAL_SECONDS: "3600"
    depends_on:
      - kafka
      - intelowl
    networks:
      - skyfall_backbone
      - skyfall_public

  # ═══════════════════════════════════════════════════════════════════════════
  #  5. PROCESAMIENTO Y ENRIQUECIMIENTO
  # ═══════════════════════════════════════════════════════════════════════════

  # ── KEVin: API de CISA KEV + NVD/MITRE (synfinner/KEVin) ───────────
  #  Requiere MongoDB + Redis.  Puerto interno 8444.
  kevin-mongo:
    image: mongo:7
    volumes:
      - kevin_mongo_data:/data/db
    networks:
      - skyfall_backbone

  kevin-redis:
    image: redis:7-alpine
    networks:
      - skyfall_backbone

  # Poblador inicial: descarga KEV catalog de CISA y lo inserta en Mongo.
  # Se ejecuta una sola vez al arrancar y termina.
  kevin-update:
    build: ../services/kevin-api
    command: ["python", "update.py"]
    environment:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI_PROD: mongodb://kevin-mongo:27017/
      API_KEY: ${NVD_API_KEY}
    depends_on:
      - kevin-mongo
    networks:
      - skyfall_backbone
      - skyfall_public
    restart: "no"

  kevin-api:
    build: ../services/kevin-api
    ports:
      - "8001:8444"
    environment:
      PYTHONUNBUFFERED: "1"
      MONGODB_URI_PROD: mongodb://kevin-mongo:27017/
      REDIS_IP: kevin-redis
      REDIS_PORT: "6379"
      API_KEY: ${NVD_API_KEY}
    depends_on:
      - kevin-mongo
      - kevin-redis
      - kevin-update
    networks:
      - skyfall_backbone
      - skyfall_public

  # ── Intel-Owl v6.5.1: despliegue stock siguiendo la guía oficial ────────
  #  https://intelowlproject.github.io/docs/IntelOwl/installation/
  #  Equivalente a:  ./start prod up
  #  Compose files oficiales replicados:
  #    docker/default.yml + postgres.override.yml + redis.override.yml
  #  Contenedores: uwsgi · daphne · celery_beat · celery_worker_default
  #                + postgres + redis  (nginx omitido: API directa en :8001)
  # ────────────────────────────────────────────────────────────────────────

  # --- Intel-Owl: PostgreSQL 16 (igual que postgres.override.yml) ---
  intelowl-db:
    image: library/postgres:16-alpine
    volumes:
      - intelowl_pg_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_USER: intelowl
      POSTGRES_PASSWORD: ${INTELOWL_DB_PASSWORD}
      POSTGRES_DB: intel_owl_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 2s
      retries: 6
      start_period: 3s
    networks:
      - skyfall_backbone

  # --- Intel-Owl: Redis 7 (igual que redis.override.yml) ---
  intelowl-redis:
    image: library/redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 ping | grep PONG"]
      interval: 5s
      timeout: 2s
      retries: 6
      start_period: 3s
    networks:
      - skyfall_backbone

  # --- Intel-Owl: uWSGI / Django API  (nombre "intelowl" para compat) ---
  #  En modo DEBUG+TEST_SERVER arranca con `manage.py runserver` y crea
  #  automáticamente un superusuario admin / admin.
  intelowl:
    image: intelowlproject/intelowl:v6.5.1
    entrypoint:
      - ./docker/entrypoints/uwsgi.sh
    ports:
      - "8002:8001"
    expose:
      - "8001"
    environment: &intelowl-env
      # ── Secrets / DB ──
      DJANGO_SECRET: ${INTELOWL_DJANGO_SECRET}
      DB_HOST: intelowl-db
      DB_PORT: "5432"
      DB_USER: intelowl
      DB_PASSWORD: ${INTELOWL_DB_PASSWORD}
      DB_NAME: intel_owl_db
      DB_SSL: "False"
      # ── Broker / WebSockets (Redis) ──
      BROKER_URL: "redis://intelowl-redis:6379/1"
      WEBSOCKETS_URL: "redis://intelowl-redis:6379/0"
      # ── App ──
      DJANGO_TEST_SERVER: "True"
      DEBUG: "True"
      STAGE: "local"
      HTTPS_ENABLED: "not_enabled"
      LOCAL_STORAGE: "True"
      INTELOWL_WEB_CLIENT_DOMAIN: localhost
    volumes:
      - intelowl_generic_logs:/var/log/intel_owl
      - intelowl_static_content:/opt/deploy/intel_owl/static
      - intelowl_shared_files:/opt/deploy/files_required
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8001 || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 300s
      retries: 2
    depends_on:
      intelowl-db:
        condition: service_healthy
      intelowl-redis:
        condition: service_healthy
    networks:
      - skyfall_backbone
      - skyfall_public

  # --- Intel-Owl: Daphne (ASGI · WebSockets) ---
  intelowl-daphne:
    image: intelowlproject/intelowl:v6.5.1
    restart: unless-stopped
    entrypoint:
      - ./docker/entrypoints/daphne.sh
    expose:
      - "8011"
    environment: *intelowl-env
    volumes:
      - intelowl_generic_logs:/var/log/intel_owl
      - intelowl_shared_files:/opt/deploy/files_required
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8011 || exit 1"]
      interval: 5s
      timeout: 2s
      start_period: 2s
      retries: 6
    depends_on:
      intelowl:
        condition: service_healthy
    networks:
      - skyfall_backbone

  # --- Intel-Owl: Celery Beat (scheduler periódico — playbooks, ingestors) ---
  intelowl-celery-beat:
    image: intelowlproject/intelowl:v6.5.1
    restart: unless-stopped
    entrypoint:
      - ./docker/entrypoints/celery_beat.sh
    environment: *intelowl-env
    volumes:
      - intelowl_generic_logs:/var/log/intel_owl
      - intelowl_shared_files:/opt/deploy/files_required
    depends_on:
      intelowl:
        condition: service_healthy
    networks:
      - skyfall_backbone

  # --- Intel-Owl: Celery Worker Default (ejecutor de analizadores) ---
  intelowl-celery-worker:
    image: intelowlproject/intelowl:v6.5.1
    restart: unless-stopped
    stop_grace_period: 10s
    entrypoint:
      - ./docker/entrypoints/celery_default.sh
    environment: *intelowl-env
    volumes:
      - intelowl_generic_logs:/var/log/intel_owl
      - intelowl_shared_files:/opt/deploy/files_required
    depends_on:
      intelowl:
        condition: service_healthy
    networks:
      - skyfall_backbone
      - skyfall_public

  # ═══════════════════════════════════════════════════════════════════════════
  #  5b. CLIENTE INTEL-OWL (PYTHON ASYNC)
  # ═══════════════════════════════════════════════════════════════════════════

  # Cliente asíncrono de alto rendimiento para enriquecimiento de
  # observables (IPs, hashes, dominios, URLs) mediante Intel-Owl.
  # Usa pyintelowl + asyncio + uvloop. Expone API HTTP y consume/produce Kafka.
  intelowl-client:
    build: ../services/intelowl-client
    ports:
      - "8004:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      INTELOWL_URL: http://intelowl:8001
      INTELOWL_API_KEY: ${INTELOWL_API_KEY}
      KAFKA_BROKER: kafka:29092
      KAFKA_GROUP_ID: cg-intelowl-client
      KAFKA_INPUT_TOPICS: enrichment.requests
      KAFKA_OUTPUT_TOPIC: enrichment.results
      MAX_CONCURRENCY: "10"
      POLL_INTERVAL_SEC: "2"
      POLL_TIMEOUT_SEC: "300"
      ANALYZERS_DEFAULT: "BGP_Ranking,Classic_DNS,FireHol_IPList"
      STIX_OUTPUT: "true"
    depends_on:
      - kafka
      - intelowl
    networks:
      - skyfall_backbone
      - skyfall_public

  # ═══════════════════════════════════════════════════════════════════════════
  #  6. CONSUMIDORES KAFKA  —  Workers Python
  # ═══════════════════════════════════════════════════════════════════════════

  # Consumer → Elasticsearch (indexación de STIX bundles + contenido crudo)
  consumer-elastic:
    build: ../services/consumer-elastic
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKER: kafka:29092
      KAFKA_GROUP_ID: cg-elasticsearch
      KAFKA_TOPICS: stix.cve,stix.osint,stix.telegram,stix.social,stix.dumps,stix.mitre
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
    depends_on:
      - kafka
      - elasticsearch
    volumes:
      - stix_dropzone:/app/dropzone
    networks:
      - skyfall_backbone

  # Consumer → Neo4j (inserción de nodos/relaciones STIX en el grafo)
  consumer-neo4j:
    build: ../services/consumer-neo4j
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BROKER: kafka:29092
      KAFKA_GROUP_ID: cg-neo4j
      KAFKA_TOPICS: stix.cve,stix.osint,stix.telegram,stix.social,stix.dumps,stix.mitre
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      - kafka
      - neo4j
    networks:
      - skyfall_backbone

  # ═══════════════════════════════════════════════════════════════════════════
  #  7. PERSISTENCIA Y VISUALIZACIÓN (ELK STACK)
  # ═══════════════════════════════════════════════════════════════════════════
  
  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.1
    container_name: deployment-kibana-1
    ports: ["5601:5601"]
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      I18N_LOCALE: "es-ES"
      KIBANA_SETTING_XPACK_SECURITY_SAMESITECOOKIES: "none" 
      ELASTICSEARCH_SERVICEACCOUNTTOKEN: ${ELASTICSEARCH_SERVICEACCOUNTTOKEN}
      XPACK_SECURITY_ENCRYPTIONKEY: ${ELASTICSEARCH_SERVICEACCOUNTTOKEN}
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY}
      XPACK_REPORTING_ENCRYPTIONKEY: ${XPACK_REPORTING_ENCRYPTIONKEY}
    deploy:
      resources:
        limits:
          memory: 1G  
    depends_on:
      - elasticsearch
    networks:
      - skyfall_backbone
      - skyfall_public

  elastic-agent:
    image: docker.elastic.co/beats/elastic-agent:8.12.0
    container_name: deployment-elastic-agent-1
    restart: always
    user: root 
    environment:
      # Estos los obtendremos de la interfaz de Kibana (Fleet)
      - FLEET_ENROLLMENT_TOKEN=${FLEET_ENROLL_TOKEN:-} 
      - FLEET_URL=http://kibana:5601
      - ELASTICSEARCH_SERVICEACCOUNTTOKEN=${ELASTICSEARCH_SERVICEACCOUNTTOKEN}
    volumes:
      - stix_dropzone:/app/dropzone:ro # El agente solo lee
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      - elasticsearch
      - kibana
    networks:
      - skyfall_backbone
      - skyfall_public
  # ═══════════════════════════════════════════════════════════════════════════
  #  8. MÓDULO DE INTELIGENCIA Y CORRELACIÓN
  # ═══════════════════════════════════════════════════════════════════════════

  # Analiza el grafo Neo4j para detectar vínculos entre amenazas sociales
  # y vulnerabilidades críticas. Expone API HTTP que el MCP-server consulta.
  correlation-engine:
    build: ../services/correlation-engine
    ports:
      - "8003:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      ELASTICSEARCH_URL: http://elasticsearch:9200
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
    depends_on:
      - neo4j
      - elasticsearch
    networks:
      - skyfall_backbone

  # ═══════════════════════════════════════════════════════════════════════════
  #  9. INTERFAZ DE ACCESO E INTELIGENCIA GENERATIVA
  # ═══════════════════════════════════════════════════════════════════════════

  # MCP Server (Model Context Protocol) — FastAPI + RAG
  # Puente de contexto para que LLMs interroguen el sistema en lenguaje natural
  mcp-server:
    build: ../services/mcp-server
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      CORRELATION_URL: http://correlation-engine:8000
    depends_on:
      - elasticsearch
      - neo4j
      - correlation-engine
    networks:
      - skyfall_public
      - skyfall_backbone

  # Frontend React — Dashboard CTI con D3.js + SSE
  frontend:
    build: ../services/frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_SSE_URL: http://localhost:8000/events
    depends_on:
      - mcp-server
    networks:
      - skyfall_public

# ═══════════════════════════════════════════════════════════════════════════
#  VOLÚMENES PERSISTENTES
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  es_data:
  neo4j_data:
  n8n_data:
  telegram_sessions:
  intelowl_pg_data:
  intelowl_generic_logs:
  intelowl_static_content:
  intelowl_shared_files:
  kevin_mongo_data:
  mitre_staging:
  stix_dropzone:
  kafka_data: